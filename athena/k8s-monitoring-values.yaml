alloy-receiver:
  alloy:
    extraEnv:
    - name: GCLOUD_RW_API_KEY
      valueFrom:
        secretKeyRef:
          key: password
          name: alloy-receiver-remote-cfg-grafana-k8s-monitoring
    - name: CLUSTER_NAME
      value: minikube
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: NODE_NAME
      valueFrom:
