USER-SUPPLIED VALUES:
alloy-logs:
  alloy:
    extraEnv:
    - name: GCLOUD_RW_API_KEY
      valueFrom:
        secretKeyRef:
          key: password
          name: alloy-logs-remote-cfg-grafana-k8s-monitoring
    - name: CLUSTER_NAME
      value: minikube
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: GCLOUD_FM_COLLECTOR_ID
      value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-logs-$(NODE_NAME)
  enabled: true
  remoteConfig:
    auth:
      password: <YOUR_GRAFANA_CLOUD_API_KEY>
      type: basic
      username: "<YOUR_GRAFANA_INSTANCE_ID>"
    enabled: true
    url: https://<YOUR_FLEET_MANAGEMENT_HOST>
alloy-metrics:
  alloy:
    extraEnv:
    - name: GCLOUD_RW_API_KEY
      valueFrom:
        secretKeyRef:
