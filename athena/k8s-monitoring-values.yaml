      type: basic
      username: "<YOUR_GRAFANA_INSTANCE_ID>"
    enabled: true
    url: https://<YOUR_FLEET_MANAGEMENT_HOST>
applicationObservability:
  enabled: true
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
      http:
        enabled: true
        port: 4318
    zipkin:
      enabled: true
      port: 9411
autoInstrumentation:
  beyla:
    deliverTracesToApplicationObservability: false
  enabled: true
cluster:
  name: minikube
clusterEvents:
  enabled: true
clusterMetrics:
  enabled: true
  kepler:
    enabled: true
  opencost:
    enabled: true
    metricsSource: grafana-cloud-metrics
    opencost:
      exporter:
        defaultClusterId: <YOUR_CLUSTER_NAME>
      prometheus:
        existingSecretName: grafana-cloud-metrics-grafana-k8s-monitoring
        external:
          url: https://<YOUR_PROMETHEUS_HOST>/api/prom
destinations:
- auth:
    password: <YOUR_GRAFANA_CLOUD_API_KEY>
    type: basic
    username: "<YOUR_GRAFANA_METRICS_USERNAME>"
  name: grafana-cloud-metrics
  type: prometheus
  url: https://<YOUR_PROMETHEUS_HOST>/api/prom/push
- auth:
    password: <YOUR_GRAFANA_CLOUD_API_KEY>
    type: basic
    username: "<YOUR_GRAFANA_LOGS_USERNAME>"
  name: grafana-cloud-logs
  type: loki
  url: https://<YOUR_LOKI_HOST>/loki/api/v1/push
- auth:
    password: <YOUR_GRAFANA_CLOUD_API_KEY>
    type: basic
    username: "<YOUR_GRAFANA_INSTANCE_ID>"
  logs:
    enabled: true
  metrics:
    enabled: true
  name: gc-otlp-endpoint
  protocol: http
  traces:
    enabled: true
  type: otlp
  url: https://<YOUR_OTLP_HOST>/otlp
- auth:
    password: <YOUR_GRAFANA_CLOUD_API_KEY>
    type: basic
    username: "<YOUR_GRAFANA_INSTANCE_ID>"
  name: grafana-cloud-profiles
  type: pyroscope
  url: https://<YOUR_PROFILES_HOST>:443
podLogs:
  enabled: true
profiling:
  enabled: true
