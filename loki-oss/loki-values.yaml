deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: <YOUR_LOKI_S3_BUCKET>
      ruler: <YOUR_LOKI_S3_BUCKET>
    s3:
      region: us-east-1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-s3-credentials
          key: access-key-id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-s3-credentials
          key: secret-access-key
    - name: AWS_SESSION_TOKEN
      valueFrom:
        secretKeyRef:
          name: aws-s3-credentials
          key: session-token

# Disable microservices components (not used in SingleBinary mode)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

lokiCanary:
  enabled: false

test:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

minio:
  enabled: false

gateway:
  enabled: false
