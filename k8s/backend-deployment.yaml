apiVersion: apps/v1
kind: Deployment
metadata:
  name: countdown-backend
  namespace: countdown
  labels:
    app: countdown-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: countdown-backend
  template:
    metadata:
      labels:
        app: countdown-backend
    spec:
      containers:
        - name: countdown-backend
          image: countdown-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
            - name: LOG_LEVEL
              value: debug
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
